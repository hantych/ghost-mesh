name: ghost_mesh
description: P2P messenger using Google Nearby Connections — no accounts, no servers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Google Nearby Connections — auto-discovery via Bluetooth + Wi-Fi
  nearby_connections: ^4.2.0

  # Permissions
  permission_handler: ^11.3.1

  # Device info — to get device name as nickname
  device_info_plus: ^10.1.2

  # Local database for chat history
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Local notifications
  flutter_local_notifications: ^17.2.3

  # State management
  provider: ^6.1.2

  # UUID generation
  uuid: ^4.5.1

  # Persistent settings
  shared_preferences: ^2.3.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
